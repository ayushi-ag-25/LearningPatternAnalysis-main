<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>TeachInsights AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Fonts & ChartJS -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      margin: 0;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
    }

    header {
      text-align: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    /* Toggle Buttons */
    .toggle-buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    button {
      padding: 12px 26px;
      border-radius: 30px;
      border: none;
      cursor: pointer;
      color: #fff;
      background: rgba(255, 255, 255, 0.2);
      font-size: 14px;
    }

    button.active {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
    }

    /* Cards */
    .card {
      display: none;
      background: rgba(255, 255, 255, 0.12);
      padding: 30px;
      border-radius: 20px;
    }

    .card.active {
      display: block;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    /* Layouts */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .chart-box {
      background: #ffffff;
      border-radius: 14px;
      padding: 15px;
      height: 320px;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }

    .insight-box {
      background: rgba(0, 0, 0, 0.4);
      padding: 20px;
      border-radius: 14px;
      margin-top: 25px;
    }
  </style>
</head>

<body>

  <header>
    <h1>TeachInsights AI</h1>
    <p>Smart Education using ML Insights</p>
  </header>

  <div class="container">

    <!-- Toggle -->
    <div class="toggle-buttons">
      <button id="csvBtn" class="active">CSV Analysis</button>
      <button id="studentBtn">Student Prediction</button>
    </div>

    <!-- CSV ANALYSIS -->
    <div id="csvCard" class="card active">
      <h2>Class CSV Analysis</h2>

      <input type="file" id="csvFile" accept=".csv">
      <button onclick="analyzeCSV()">Analyze New CSV</button>

      <div class="charts-grid">
        <div class="chart-box"><canvas id="bar1"></canvas></div>
        <div class="chart-box"><canvas id="bar2"></canvas></div>
        <div class="chart-box"><canvas id="pie1"></canvas></div>
        <div class="chart-box"><canvas id="pie2"></canvas></div>
        <div class="chart-box"><canvas id="pie3"></canvas></div>
      </div>

      <div class="insight-box" id="csvInsight">
        <h3>AI Teaching Insights</h3>
        <p>Loading insights from default dataset...</p>
      </div>
    </div>

    <!-- STUDENT PREDICTION -->
    <div id="studentCard" class="card">
      <h2>Single Student Prediction</h2>

      <form class="grid">
        <input type="number" placeholder="Hours Studied">
        <input type="number" placeholder="Attendance %">
        <input type="number" placeholder="Sleep Hours">
        <input type="number" placeholder="Previous Score">
      </form>

      <button onclick="predictStudent()">Predict</button>

      <div class="charts-grid">
        <div class="chart-box"><canvas id="radar"></canvas></div>
      </div>

      <div class="insight-box">
        <h3>Student Insights</h3>
        <p>Performance strengths and improvement areas.</p>
      </div>
    </div>

  </div>

  <!-- ================= SCRIPT ================= -->

  <script>
    let radarChart = null;

    let charts = [];

    /* Toggle Logic */
    const csvBtn = document.getElementById("csvBtn");
    const studentBtn = document.getElementById("studentBtn");
    const csvCard = document.getElementById("csvCard");
    const studentCard = document.getElementById("studentCard");

    csvBtn.onclick = () => {
      csvBtn.classList.add("active");
      studentBtn.classList.remove("active");
      csvCard.classList.add("active");
      studentCard.classList.remove("active");
    };

    studentBtn.onclick = () => {
      studentBtn.classList.add("active");
      csvBtn.classList.remove("active");
      studentCard.classList.add("active");
      csvCard.classList.remove("active");

      // 🔥 render radar ONLY after card is visible
      setTimeout(renderRadarChart, 50);
    };


    /* Chart Utils */
    function destroyCharts() {
      charts.forEach(c => c.destroy());
      charts = [];
    }

    function renderCSVCharts(data) {
      destroyCharts();

      const options = {
        responsive: true,
        maintainAspectRatio: false
      };

      charts.push(new Chart(bar1, { type: "bar", data: data.bar1, options }));
      charts.push(new Chart(bar2, { type: "bar", data: data.bar2, options }));
      charts.push(new Chart(pie1, { type: "pie", data: data.pie1, options }));
      charts.push(new Chart(pie2, { type: "pie", data: data.pie2, options }));
      charts.push(new Chart(pie3, { type: "pie", data: data.pie3, options }));

      csvInsight.innerHTML =
        `<h3>AI Teaching Insights</h3><p>${data.insight}</p>`;
    }

    /* Default CSV */
    async function loadDefaultCSV() {
      const res = await fetch("/analyze-default");
      const data = await res.json();
      renderCSVCharts(data);
    }

    /* Upload CSV */
    async function analyzeCSV() {
      const file = csvFile.files[0];
      if (!file) return alert("Please select a CSV");

      const fd = new FormData();
      fd.append("csv_file", file);

      const res = await fetch("/analyze", { method: "POST", body: fd });
      const data = await res.json();
      renderCSVCharts(data);
    }

    /* Student Prediction */
    function renderRadarChart() {
      if (radarChart) return; // prevent re-creation

      radarChart = new Chart(document.getElementById("radar"), {
        type: "radar",
        data: {
          labels: ["Study", "Attendance", "Sleep", "Score"],
          datasets: [{
            label: "Student Performance",
            data: [70, 85, 65, 75],
            backgroundColor: "rgba(0,114,255,0.25)",
            borderColor: "#0072ff",
            pointBackgroundColor: "#0072ff"
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            r: {
              ticks: { backdropColor: "transparent" }
            }
          }
        }
      });
    }

    /* Init */
    loadDefaultCSV();
  </script>

</body>

</html>
